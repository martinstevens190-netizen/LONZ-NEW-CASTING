<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinkCast Receiver</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: #000;
        color: white;
        font-family: Inter, Arial, sans-serif;
      }
      .stage {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, rgba(239,68,68,0.25), transparent 30%), #000;
      }
      #player, #player iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }
      .waiting {
        text-align: center;
        z-index: 2;
      }
      .waiting h1 {
        margin-bottom: 8px;
        font-size: 2rem;
      }
      .waiting p {
        color: rgba(255,255,255,0.75);
      }
      .badge {
        display: inline-block;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(255,255,255,0.1);
        margin-bottom: 16px;
      }
      .hidden {
        display: none;
      }
    </style>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  </head>
  <body>
    <div class="stage">
      <div id="waiting" class="waiting">
        <div class="badge">LinkCast Receiver</div>
        <h1>Ready to receive a YouTube link</h1>
        <p>Choose this receiver from the sender app, then send a video.</p>
      </div>
      <div id="player"></div>
    </div>

    <script>
      const NAMESPACE = 'urn:x-cast:com.linkcast.youtube';
      let player;
      let ytReady = false;
      let queuedVideoId = null;

      function loadVideo(videoId) {
        if (!ytReady) {
          queuedVideoId = videoId;
          return;
        }

        document.getElementById('waiting').classList.add('hidden');

        if (!player) {
          player = new YT.Player('player', {
            videoId,
            playerVars: {
              autoplay: 1,
              controls: 1,
              rel: 0,
            },
          });
          return;
        }

        player.loadVideoById(videoId);
      }

      window.onYouTubeIframeAPIReady = function () {
        ytReady = true;
        if (queuedVideoId) loadVideo(queuedVideoId);
      };

      const context = cast.framework.CastReceiverContext.getInstance();
      context.addCustomMessageListener(NAMESPACE, (event) => {
        const data = event.data || {};
        if (data.type === 'LOAD_YOUTUBE' && data.videoId) {
          loadVideo(data.videoId);
        }
      });

      context.start();
    </script>
  </body>
</html>
